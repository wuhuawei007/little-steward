<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="小管家">
  <title>小管家 · 资产与储蓄</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow" id="todayLabel"></p>
        <h1 id="pageTitle">我的资产</h1>
      </div>
      <button class="icon-button avatar-button" id="settingsButton" aria-label="设置">J</button>
    </header>

    <main>
      <section class="page active" id="overviewPage">
        <article class="hero-card">
          <div class="hero-topline">
            <span>净资产</span>
            <button class="ghost-button" id="togglePrivacy" aria-label="隐藏金额">
              <span id="privacyIcon">◉</span>
            </button>
          </div>
          <strong class="hero-amount money" id="netWorth">$0</strong>
          <div class="change-pill" id="netChange">本月净增长 $0</div>
          <div class="hero-grid">
            <div>
              <span>总资产</span>
              <strong class="money" id="totalAssets">$0</strong>
            </div>
            <div>
              <span>总负债</span>
              <strong class="money" id="totalLiabilities">$0</strong>
            </div>
          </div>
        </article>

        <div class="section-heading">
          <div>
            <p class="eyebrow">财富分布</p>
            <h2>资产组合</h2>
          </div>
          <button class="text-button" data-action="add-asset">添加</button>
        </div>
        <article class="card allocation-card">
          <div class="donut-wrap">
            <div class="donut" id="allocationDonut"><span id="assetCount">0</span></div>
          </div>
          <div class="legend" id="allocationLegend"></div>
        </article>

        <div class="section-heading">
          <div>
            <p class="eyebrow">最近更新</p>
            <h2>我的账户</h2>
          </div>
          <button class="text-button" data-target-page="assetsPage">查看全部</button>
        </div>
        <div class="stack-list" id="recentAccounts"></div>
      </section>

      <section class="page" id="assetsPage">
        <div class="segmented-control" id="assetSegment">
          <button class="active" data-filter="all">全部</button>
          <button data-filter="asset">资产</button>
          <button data-filter="liability">负债</button>
        </div>
        <div class="summary-strip">
          <span>净资产</span>
          <strong class="money" id="assetsPageNetWorth">$0</strong>
        </div>
        <div class="stack-list roomy" id="allAccounts"></div>
        <button class="primary-button full-width" data-action="add-asset">＋ 添加资产或负债</button>
      </section>

      <section class="page" id="savingsPage">
        <article class="savings-hero">
          <p class="eyebrow">今年已储蓄</p>
          <strong class="money" id="yearSavings">$0</strong>
          <div class="spark-bars" id="savingsBars"></div>
        </article>
        <div class="section-heading">
          <div>
            <p class="eyebrow">月末记录</p>
            <h2>储蓄账户余额</h2>
          </div>
          <button class="text-button" data-action="add-saving">记录</button>
        </div>
        <div class="timeline" id="savingsTimeline"></div>
        <button class="primary-button full-width" data-action="add-saving">＋ 记录本月余额</button>
      </section>

      <section class="page" id="notesPage">
        <div class="notes-intro">
          <p class="eyebrow">财务随手记</p>
          <h2>记下重要决定，<br>也记下生活。</h2>
        </div>
        <div class="notes-grid" id="notesGrid"></div>
        <button class="floating-add" data-action="add-note" aria-label="添加备注">＋</button>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="active" data-page="overviewPage"><span>⌂</span>总览</button>
      <button data-page="assetsPage"><span>▦</span>资产</button>
      <button data-page="savingsPage"><span>↗</span>储蓄</button>
      <button data-page="notesPage"><span>✎</span>Notes</button>
    </nav>
  </div>

  <dialog id="editorDialog">
    <form method="dialog" id="editorForm">
      <div class="dialog-handle"></div>
      <div class="dialog-header">
        <button type="button" class="text-button subtle" id="cancelDialog">取消</button>
        <h3 id="dialogTitle">添加</h3>
        <button type="submit" class="text-button">保存</button>
      </div>
      <div id="formFields"></div>
      <button type="button" class="danger-button hidden" id="deleteButton">删除此记录</button>
    </form>
  </dialog>

  <dialog id="settingsDialog">
    <div class="settings-sheet">
      <div class="dialog-handle"></div>
      <div class="dialog-header">
        <span></span>
        <h3>设置</h3>
        <button class="text-button" id="closeSettings">完成</button>
      </div>
      <label class="field">
        <span>显示货币</span>
        <select id="currencySelect">
          <option value="AUD">澳元 AUD</option>
          <option value="CNY">人民币 CNY</option>
          <option value="USD">美元 USD</option>
        </select>
      </label>
      <div class="settings-row">
        <div><strong>本地保存</strong><span>数据仅保存在这台设备</span></div>
        <span class="status-dot"></span>
      </div>
      <button class="danger-button" id="resetData">恢复示例数据</button>
    </div>
  </dialog>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
